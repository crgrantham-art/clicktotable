<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click to Table — Full Blueprint Experience</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --ink: #2E322F;
    --gold: #B89A57;
    --sky: #A8BCA6;
    --pale-sage: #DDE8DD;
    --sage: #6C8A72;
    --warm: #FBFAF7;https://script.google.com/macros/s/AKfycbwgqnGuat6G7AHhNGMQvvDeJJoQjxXCnHT4RZsx-1MKViUPHH4zCWh2Y1-iAO-2JY3dZQ/exec
    --gray: #6F736E;
    --stone: #D8D7D2;
    --ghost: #3B403C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #E7E5E0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 28px 16px;
  }

  .caption {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 16px;
    text-align: center;
    max-width: 380px;
  }
  .caption b { color: var(--ink); }

  .phone {
    width: 390px;
    max-width: 100%;
    min-height: 720px;
    background: var(--warm);
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(46,50,47,0.25);
    overflow: hidden;
    position: relative;
  }

  .screen {
    display: flex;
    flex-direction: column;
    padding: 28px 24px 28px;
    min-height: 720px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .topbar .section-label { color: var(--ink); font-weight: 700; }

  .progress-track {
    height: 4px;
    background: var(--stone);
    border-radius: 4px;
    margin: 12px 0 22px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .decision-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 23px;
    color: var(--ink);
    line-height: 1.25;
    margin-bottom: 16px;
  }

  .tip {
    background: var(--pale-sage);
    border-radius: 14px;
    padding: 13px 15px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .tip .avatar {
    width: 20px; height: 20px;
    background: var(--ink);
    color: var(--warm);
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .tip p { font-size: 12.5px; color: var(--ink); line-height: 1.4; }

  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: auto; }

  .option {
    border: 1.5px solid var(--stone);
    background: #fff;
    border-radius: 13px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.35;
  }
  .option:hover { border-color: var(--sage); }
  .option.selected {
    border-color: var(--sage);
    background: var(--pale-sage);
    font-weight: 500;
  }

  textarea.option-text {
    width: 100%;
    border: 1.5px solid var(--stone);
    border-radius: 13px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    min-height: 90px;
  }
  .char-hint { font-size: 11px; color: var(--gray); margin-top: 6px; text-align: right; }

  .btn {
    margin-top: 20px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 30px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.secondary { background: transparent; border: 1.5px solid var(--ink); color: var(--ink); }
  .btn.dark { background: var(--gold); }

  .back-link {
    margin-top: 10px;
    background: none;
    border: none;
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    cursor: pointer;
    text-align: center;
  }

  /* Reveal */
  .reveal-screen { background: var(--warm); align-items: center; justify-content: center; text-align: center; }
  .reveal-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 12px; }
  .reveal-icon {
    width: 74px; height: 74px; border-radius: 50%; background: var(--sage);
    display: flex; align-items: center; justify-content: center; margin-bottom: 18px; font-size: 30px;
  }
  .reveal-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); margin-bottom: 4px; }
  .reveal-sub { font-size: 13px; color: var(--sage); font-style: italic; margin-bottom: 18px; }
  .reveal-desc { font-size: 13.5px; color: var(--ink); line-height: 1.5; max-width: 300px; margin-bottom: 22px; }
  .reveal-card { background: #fff; border: 1.5px solid var(--stone); border-radius: 16px; padding: 15px 17px; width: 100%; text-align: left; margin-bottom: 20px; }
  .reveal-card .label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em; color: var(--gray); margin-bottom: 5px; }
  .reveal-card .val { font-size: 13px; color: var(--ink); line-height: 1.4; }

  /* Welcome */
  .welcome-screen { background: var(--ink); justify-content: center; align-items: center; text-align: center; }
  .welcome-kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 16px; }
  .welcome-title { font-family: 'DM Serif Display', serif; font-size: 34px; color: var(--warm); margin-bottom: 10px; line-height: 1.15; }
  .welcome-sub { font-size: 14px; color: var(--sky); font-style: italic; margin-bottom: 26px; }
  .welcome-meta { font-size: 12px; color: var(--gray); margin-bottom: 26px; }

  /* Final profile + email + confirmation */
  .profile-screen { background: var(--ink); padding: 30px 24px 26px; }
  .profile-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; color: var(--gold); text-align: center; margin-bottom: 8px; }
  .profile-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--warm); text-align: center; margin-bottom: 4px; line-height: 1.2; }
  .profile-sub { font-size: 12px; color: var(--sky); font-style: italic; text-align: center; margin-bottom: 20px; }
  .profile-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .profile-row { background: var(--ghost); border-radius: 12px; padding: 10px 13px; display: flex; align-items: center; gap: 11px; }
  .profile-row .p-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--sage); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .profile-row .p-label { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; color: var(--sky); margin-bottom: 1px; }
  .profile-row .p-title { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--warm); }

  .confirm-screen { background: var(--pale-sage); align-items: center; justify-content: center; text-align: center; }
  .confirm-check { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--ink); display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 20px; }
  .confirm-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); margin-bottom: 10px; }
  .confirm-desc { font-size: 13.5px; color: var(--ink); line-height: 1.5; max-width: 290px; margin-bottom: 4px; }


  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .contact-field { display: flex; flex-direction: column; gap: 5px; }
  .contact-field.full { grid-column: 1 / -1; }
  .contact-field label { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; color: var(--gray); }
  .contact-input {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--stone);
    border-radius: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: #fff;
  }
  .contact-input:focus, textarea.option-text:focus {
    outline: none;
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(108,138,114,0.12);
  }
  .save-status {
    min-height: 18px;
    margin-top: 9px;
    font-size: 11px;
    color: var(--gray);
    text-align: center;
  }
  .complete-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    align-self: center;
    padding: 7px 11px;
    border-radius: 999px;
    background: var(--pale-sage);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  @media (max-width: 380px) {
    .contact-grid { grid-template-columns: 1fr; }
    .contact-field.full { grid-column: auto; }
  }

  .step-dots {
    position: absolute;
    bottom: -30px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: var(--gray);
  }
</style>
</head>
<body>

<div class="phone" id="phone"></div>
<div class="step-dots" id="stepDots"></div>

<script>
// ---------------- CONFIG ----------------

const CONFIG = {
  APPS_SCRIPT_URL: "PASTE_YOUR_NEW_WEB_APP_URL_HERE"
};

let submissionId =
  typeof crypto !== "undefined" && crypto.randomUUID
    ? crypto.randomUUID()
    : `ctt-${Date.now()}-${Math.random().toString(36).slice(2)}`;

// ---------------- DATA ----------------

const SECTIONS = [

  {

      {

      full: { icon: "🗂️", title: "Full Range", sub: "Catalog size: 13–15 packages",

  },
  {
    num: 3, label: "SECTION 3",
    questions: [
      {
        id: "q7", decision: "DECISION 7",
        text: "Which best describes your current website?",
        tip: "No judgment here. Just tell us honestly where you're starting from.",
        options: [
          { text: "No website, or just social media", scopeKey: "diy" },
          { text: "A basic informational site, no online ordering", scopeKey: "transitioning" },

      {

    reveals: {

        desc: "You're starting from the ground up, and that's a completely normal place to be. Everything today is aimed at getting you from zero to a working first channel.",

      transitioning: { icon: "🔄", title: "Transitioning", sub: "Digital readiness: building on a foundation",
        desc: "You've got a foundation already. The next step isn't starting over, it's adding ordering on top of what you have.",
        meaning: "Your Blueprint will focus on connecting ordering to your existing site rather than replacing it." },
      ready: { icon: "✅", title: "Digital-Ready", sub: "Digital readiness: infrastructure in place",
        desc: "You already have the infrastructure. Your opportunity is less about building and more about optimizing what's already live.",
        meaning: "Your Blueprint will focus on conversion, merchandising, and refinement rather than platform selection." },
    }
  },
  {
    num: 4, label: "SECTION 4",
    questions: [
      {
        id: "q10", decision: "DECISION 10",
        text: "Which operational area concerns you most?",
        tip: "There's no wrong answer. Name what actually keeps you up at night.",
        options: [
          { text: "Kitchen & production capacity", scopeKey: "kitchen" },
          { text: "Packaging", scopeKey: "packaging" },
          { text: "Delivery", scopeKey: "delivery" },
          { text: "Staffing & communication", scopeKey: "staff" },
        ],
      },
      {
        id: "q11", decision: "DECISION 11",
        text: "How are deliveries primarily handled today?",
        tip: null,
        options: ["In-house team", "Third-party delivery partner", "A mix of both", "Customers pick up"],

      {
        id: "q12", decision: "DECISION 12",

      kitchen: { icon: "🍳", title: "The Capacity Builder", sub: "Operational focus: production",
        desc: "Your kitchen is the engine, and you're worried about keeping up. The fix usually isn't a bigger kitchen, it's better alignment between what you already produce and what you sell online.",

        desc: "You know the details make or break execution. Standardizing containers and packaging is one of the highest-leverage, lowest-cost fixes available to you.",

  },
  {
    num: 5, label: "SECTION 5",
    questions: [
      {
        id: "q13", decision: "DECISION 13", isOpen: true,

        tip: "One sentence is plenty.",
      },
      {
        id: "q14", decision: "DECISION 14",
        text: "Which statement best describes your organization today?",
        tip: "Pick whichever feels closest. There's no wrong stage to be in.",
        options: [
          { text: "Just exploring, haven't launched yet", scopeKey: "validate" },
          { text: "Launched, still refining what works", scopeKey: "optimize" },
          { text: "Live and working well, ready to expand", scopeKey: "scale" },
        ],
      },
      {
        id: "q15", decision: "DECISION 15", isOpen: true,
        text: "Six months from now, what would make you consider this project a success?",
        tip: "One sentence is plenty.",
      },
    ],
    reveals: {
      validate: { icon: "🧪", title: "Validate", sub: "Growth stage: proving the concept",
        desc: "You're in the validate stage, and that's exactly on schedule. Focus on proving your first channel works before adding anything else.",
        meaning: "Your Blueprint will focus entirely on a clean, scoped first launch, not on expansion yet." },
      optimize: { icon: "🎛️", title: "Optimize", sub: "Growth stage: refining what's live",

];

// ---------------- STATE ----------------

const STORAGE_KEY = "clickToTableBlueprintV1";

const STEPS = ["welcome", "contact"];
SECTIONS.forEach(sec => {
  sec.questions.forEach(q => STEPS.push({ type: "question", sectionNum: sec.num, q }));
  STEPS.push({ type: "reveal", sectionNum: sec.num });
});
STEPS.push("final", "email", "confirm");

let stepIndex = 0;
const answers = {};
const contact = {
  firstName: "",
  lastName: "",
  company: "",
  title: "",
  email: "",
  city: "",
  state: ""
};

function totalQuestions() { return 15; }
function questionNumberFor(qId) { return parseInt(qId.replace('q','')); }

function saveLocalProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      submissionId,
      stepIndex,
      answers,
      contact,
      savedAt: new Date().toISOString()
    }));
  } catch (err) {
    console.warn("Local progress could not be saved:", err);
  }
}

function restoreLocalProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (!saved) return;

    if (saved.submissionId) submissionId = saved.submissionId;
    if (saved.submissionId) submissionId = saved.submissionId;
    if (saved.answers) Object.assign(answers, saved.answers);
    if (saved.contact) Object.assign(contact, saved.contact);

    if (Number.isInteger(saved.stepIndex)) {
      stepIndex = Math.min(Math.max(saved.stepIndex, 0), STEPS.length - 2);
    }
  } catch (err) {
    console.warn("Saved progress could not be restored:", err);
  }
}

function clearLocalProgress() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (err) {
    console.warn("Saved progress could not be cleared:", err);
  }
}

// ---------------- RENDER ----------------

function render() {
  const step = STEPS[stepIndex];
  const phone = document.getElementById('phone');
  const dots = document.getElementById('stepDots');

  if (step === "welcome") {
    phone.innerHTML = renderWelcome();
    dots.textContent = "Welcome screen";
  } else if (step === "contact") {
    phone.innerHTML = renderContact();
    dots.textContent = "Your details";
  } else if (step === "final") {
    phone.innerHTML = renderFinal();
    dots.textContent = "Final Profile";
  } else if (step === "email") {
    phone.innerHTML = renderEmail();
    dots.textContent = "Email capture";
  } else if (step === "confirm") {
    phone.innerHTML = renderConfirm();
    dots.textContent = "Confirmation";
  } else if (step.type === "question") {
    phone.innerHTML = renderQuestion(step.sectionNum, step.q);
    dots.textContent = `Question ${questionNumberFor(step.q.id)} of 15`;
  } else if (step.type === "reveal") {
    phone.innerHTML = renderReveal(step.sectionNum);
    dots.textContent = `Section ${step.sectionNum} reveal`;
  }
}

function renderWelcome() {
  return `
    <div class="screen welcome-screen">
      <div class="welcome-kicker">FROM CLICK TO TABLE</div>
      <div class="welcome-title">Build Your<br>Launch Blueprint</div>
      <div class="welcome-sub">Five sections. Fifteen questions. One plan.</div>
      <div class="welcome-meta">Takes about 8 minutes.</div>
      <button class="btn" style="width:auto;padding:15px 32px;" onclick="goNext()">Let's begin →</button>
    </div>
  `;
}


function renderContact() {
  return `
    <div class="screen" style="justify-content:center;">
      <div class="decision-label" style="text-align:center;">YOUR BLUEPRINT</div>
      <h1 style="text-align:center;">Let's make this yours.</h1>
      <p style="font-size:13px;color:var(--gray);text-align:center;margin-bottom:20px;line-height:1.5;">
        Add your details so your progress can be saved and Rosie can send your personalized Blueprint. Your information will only be used for this follow-up.
      </p>

      <div class="contact-grid">
        <div class="contact-field">
          <label for="firstNameInput">FIRST NAME *</label>
          <input class="contact-input" id="firstNameInput" autocomplete="given-name" value="${escapeHtml(contact.firstName)}">
        </div>
        <div class="contact-field">
          <label for="lastNameInput">LAST NAME *</label>
          <input class="contact-input" id="lastNameInput" autocomplete="family-name" value="${escapeHtml(contact.lastName)}">
        </div>
        <div class="contact-field full">
          <label for="companyInput">COMPANY *</label>
          <input class="contact-input" id="companyInput" autocomplete="organization" value="${escapeHtml(contact.company)}">
        </div>
        <div class="contact-field full">
          <label for="contactEmailInput">EMAIL *</label>
          <input class="contact-input" type="email" id="contactEmailInput" autocomplete="email" value="${escapeHtml(contact.email)}"
            onkeydown="if(event.key === 'Enter') saveContactAndContinue()">
        </div>
      </div>

      <button class="btn" id="contactContinueBtn" onclick="saveContactAndContinue()">Start my Blueprint →</button>
      <button class="back-link" onclick="goBack()">← Back</button>
      <div class="save-status" id="contactSaveStatus"></div>
    </div>
  `;
}

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function saveContactAndContinue() {
  const firstName = document.getElementById("firstNameInput").value.trim();
  const lastName = document.getElementById("lastNameInput").value.trim();
  const company = document.getElementById("companyInput").value.trim();
  const email = document.getElementById("contactEmailInput").value.trim();

  if (!firstName || !lastName || !company || !email) {
    alert("Please complete your first name, last name, company, and email.");
    return;
  }

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert("Please enter a valid email address.");
    document.getElementById("contactEmailInput").focus();
    return;
  }

  Object.assign(contact, { firstName, lastName, company, email });
  saveLocalProgress();
  autosaveBlueprint();
  goNext();
}

function renderQuestion(secNum, q) {
  const sec = SECTIONS[secNum - 1];
  const stepNum = questionNumberFor(q.id);
  const progress = Math.round((stepNum / 15) * 100);
  const existing = answers[q.id];

  let bodyHtml = "";
  if (q.isOpen) {
    bodyHtml = `
      <textarea class="option-text" id="openAnswer" placeholder="Type your answer..." oninput="document.getElementById('continueBtn').disabled = this.value.trim().length === 0;">${existing ? existing.text : ''}</textarea>
      <div class="char-hint">One sentence is plenty.</div>
    `;
  } else {
    bodyHtml = `<div class="options" id="optionsContainer">` +
      q.options.map((opt, i) => {
        const text = typeof opt === "string" ? opt : opt.text;
        const isOther = typeof opt === "object" && opt.isOther;
        const isSelected = existing && (isOther ? existing.isOtherSelected : (existing.text === text && !existing.isOtherSelected));
        return `<button class="option ${isSelected ? 'selected' : ''}" onclick="selectOption('${q.id}', ${i}, this)">${text}</button>`;
      }).join('') +
      `</div>` +
      (q.options.some(o => typeof o === "object" && o.isOther) ?
        `<div id="otherInputWrap" style="${existing && existing.isOtherSelected ? '' : 'display:none;'}margin-top:10px;">
          <input type="text" class="option-text" id="otherInput" placeholder="Which platform?"
            value="${existing && existing.isOtherSelected ? existing.text : ''}"
            style="width:100%;padding:13px 16px;border:1.5px solid var(--stone);border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;"
            oninput="updateOtherAnswer('${q.id}', this.value)">
        </div>` : '');
  }

  return `
    <div class="screen">
      <div class="topbar">
        <span>STEP ${stepNum} OF 15</span>
        <span class="section-label">${sec.label}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="decision-label">${q.decision}</div>
      <h1>${q.text}</h1>
      ${q.tip ? `<div class="tip"><div class="avatar">R</div><p>${q.tip}</p></div>` : ''}
      ${bodyHtml}
      <button class="btn" id="continueBtn" ${(existing && existing.text.length > 0) ? '' : 'disabled'} onclick="submitQuestion('${q.id}', ${secNum})">Continue →</button>
      ${stepIndex > 0 ? `<button class="back-link" onclick="goBack()">← Back</button>` : ''}
    </div>
  `;
}

function selectOption(qId, idx, btn) {
  const sec = SECTIONS.find(s => s.questions.some(q => q.id === qId));
  const q = sec.questions.find(q => q.id === qId);
  const opt = q.options[idx];
  const text = typeof opt === "string" ? opt : opt.text;
  const scopeKey = typeof opt === "string" ? null : opt.scopeKey;
  const isOther = typeof opt === "object" && opt.isOther;

  document.querySelectorAll('#optionsContainer .option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');

  const otherWrap = document.getElementById('otherInputWrap');

  if (isOther) {
    answers[qId] = { text: "", scopeKey: null, isOtherSelected: true };
    if (otherWrap) {
      otherWrap.style.display = '';
      document.getElementById('otherInput').focus();
    }
    document.getElementById('continueBtn').disabled = true; // wait for them to type the platform name
  } else {
    answers[qId] = { text, scopeKey, isOtherSelected: false };
    if (otherWrap) otherWrap.style.display = 'none';
    document.getElementById('continueBtn').disabled = false;
  }
  saveLocalProgress();
  autosaveBlueprint();
}

function updateOtherAnswer(qId, value) {
  const val = value.trim();
  answers[qId] = { text: val, scopeKey: null, isOtherSelected: true };
  document.getElementById('continueBtn').disabled = val.length === 0;
  saveLocalProgress();
  autosaveBlueprint();
}

function submitQuestion(qId, secNum) {
  const sec = SECTIONS[secNum - 1];
  const q = sec.questions.find(qq => qq.id === qId);
  if (q.isOpen) {
    const val = document.getElementById('openAnswer').value.trim();
    if (!val) return;
    answers[qId] = { text: val, scopeKey: null };
  }
  saveLocalProgress();
  autosaveBlueprint();
  goNext();
}

function renderReveal(secNum) {
  const sec = SECTIONS[secNum - 1];
  // find the question in this section that has a scopeKey answer
  const drivingAnswer = sec.questions.map(q => answers[q.id]).find(a => a && a.scopeKey);
  const key = drivingAnswer ? drivingAnswer.scopeKey : Object.keys(sec.reveals)[0];
  const r = sec.reveals[key];

  return `
    <div class="screen reveal-screen">
      <div class="reveal-eyebrow">${sec.label} SNAPSHOT</div>
      <div class="reveal-icon">${r.icon}</div>
      <div class="reveal-title">${r.title}</div>
      <div class="reveal-sub">${r.sub}</div>
      <div class="reveal-desc">${r.desc}</div>
      <div class="reveal-card">
        <div class="label">WHAT THIS MEANS FOR YOUR BLUEPRINT</div>
        <div class="val">${r.meaning}</div>
      </div>
      <button class="btn" onclick="goNext()">Continue →</button>
    </div>
  `;
}

function renderFinal() {
  const rowsHtml = SECTIONS.map(sec => {
    const drivingAnswer = sec.questions.map(q => answers[q.id]).find(a => a && a.scopeKey);
    const key = drivingAnswer ? drivingAnswer.scopeKey : Object.keys(sec.reveals)[0];
    const r = sec.reveals[key];
    return `
      <div class="profile-row">
        <div class="p-icon">${r.icon}</div>
        <div class="p-text">
          <div class="p-label">${sec.label}</div>
          <div class="p-title">${r.title}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="screen profile-screen">
      <div class="profile-eyebrow">YOUR LAUNCH PROFILE</div>
      <div class="profile-title">Five decisions.<br>One combination.</div>
      <div class="profile-sub">Your starting point, not a finished plan.</div>
      <div class="profile-rows">${rowsHtml}</div>
      <button class="btn" onclick="goNext()">See what's next →</button>
    </div>
  `;
}

function renderEmail() {
  return `
    <div class="screen" style="justify-content:center;">
      <div class="complete-badge">✓ Your Blueprint is complete</div>
      <div class="decision-label" style="text-align:center;">ALMOST THERE</div>
      <h1 style="text-align:center;">Ready to submit, ${escapeHtml(contact.firstName || "there")}?</h1>
      <p style="font-size:13px;color:var(--gray);text-align:center;margin-bottom:18px;line-height:1.5;">
        Rosie reviews every submission personally and will send recommendations to:
      </p>
      <div class="reveal-card" style="text-align:center;margin-bottom:14px;">
        <div class="label">EMAIL</div>
        <div class="val">${escapeHtml(contact.email)}</div>
      </div>
      <button class="btn" id="submitBlueprintBtn" onclick="submitBlueprint()">Submit my Blueprint →</button>
      <button class="back-link" onclick="goBack()">← Back to my profile</button>
      <div class="save-status" id="submitStatus"></div>
    </div>
  `;
}

function renderConfirm() {
  return `
    <div class="screen confirm-screen">
      <div class="confirm-check">✓</div>
      <div class="confirm-title">Thanks, ${escapeHtml(contact.firstName || "you")}!</div>
      <div class="confirm-desc">
        Your Blueprint has been submitted. Rosie will personally review it and send recommendations to
        <strong>${escapeHtml(contact.email)}</strong>.
      </div>
    </div>
  `;
}


function buildAnswerPayload() {
  const flatAnswers = {};

  for (let i = 1; i <= 15; i++) {
    const answer = answers[`q${i}`];
    flatAnswers[`q${i}`] = answer ? answer.text || "" : "";
  }

  if (answers.q8 && answers.q8.isOtherSelected) {
    flatAnswers.q8 = "Something else";
    flatAnswers.q8Other = answers.q8.text || "";
  } else {
    flatAnswers.q8Other = "";
  }

  return flatAnswers;
}

function buildPayload() {
  return {
    submissionId,
    contact: { ...contact },
    answers: buildAnswerPayload()
  };
}

let autosaveTimer = null;

function autosaveBlueprint() {
  if (!contact.email) return;
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.includes("PASTE_YOUR_NEW_WEB_APP_URL_HERE")) return;

  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async () => {
    try {
      const body = new URLSearchParams({
        action: "autosave",
        payload: JSON.stringify(buildPayload())
      });

      await fetch(CONFIG.APPS_SCRIPT_URL, {
        method: "POST",
        body
      });
    } catch (error) {
      console.warn("Autosave did not complete:", error);
    }
  }, 500);
}

async function submitBlueprint() {
  if (!contact.email) {
    alert("Your contact information is missing. Please go back and complete it.");
    return;
  }

  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.includes("PASTE_YOUR_NEW_WEB_APP_URL_HERE")) {
    alert("The Apps Script URL still needs to be added to this HTML file.");
    return;
  }

  const submitButton = document.getElementById("submitBlueprintBtn");
  const status = document.getElementById("submitStatus");

  if (submitButton) {
    submitButton.disabled = true;
    submitButton.textContent = "Submitting...";
  }
  if (status) status.textContent = "Saving your responses...";

  try {
    const body = new URLSearchParams({
      action: "submit",
      payload: JSON.stringify(buildPayload())
    });

    const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: "POST",
      body
    });

    if (!response.ok) {
      throw new Error(`Submission failed with status ${response.status}`);
    }

    const result = await response.json();

    if (!result.ok) {
      throw new Error(result.error || "The submission could not be saved.");
    }

    clearLocalProgress();
    goNext();
  } catch (error) {
    console.error("Blueprint submission error:", error);
    alert("We couldn't submit your Blueprint. Please check your connection and try again.");

    if (status) status.textContent = "Submission did not complete. Please try again.";
    if (submitButton) {
      submitButton.disabled = false;
      submitButton.textContent = "Submit my Blueprint →";
    }
  }
}

function goNext() {
  if (stepIndex < STEPS.length - 1) {
    stepIndex++;
    saveLocalProgress();
    render();
    window.scrollTo(0, 0);
  }
}

function goBack() {
  if (stepIndex > 0) {
    stepIndex--;
    saveLocalProgress();
    render();
  }
}

restoreLocalProgress();
render();
</script>

</body>
</html>
